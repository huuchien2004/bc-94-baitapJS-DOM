<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baitap JS Dom</title>
</head>
<body>
    <h2>Bai 1: Tính tiền lương nhân viên</h2>
    <input type="number" placeholder="Nhập số ngày làm" id="numNgayLam">
    <button id="btnTongTien-1">Tính</button>
    <p id="pInfo-1"></p>

    <hr>
    <h2>Bài 2: Tính giá trị trung bình</h2>
    <input type="number" placeholder="Nhập số thứ 1" id="num1-2">
    <input type="number" placeholder="Nhập số thứ 2" id="num2-2">
    <input type="number" placeholder="Nhập số thứ 3" id="num3-2">
    <input type="number" placeholder="Nhập số thứ 4" id="num4-2">
    <input type="number" placeholder="Nhập số thứ 5" id="num5-2">
    <button id="btnTinhTB">Tính</button>
    <p id="pInfo-2"></p>
    <hr>

    <h2>Bài 3: Quy đổi tiền USD => VNĐ</h2>
    Tỉ giá: <input type="number" placeholder="23.500" id="tiGia">
    <input type="number" placeholder="Nhập số tiền cần quy đổi" id="soTien">
    <button id="btnTinh-3">Quy Đổi</button>
    <p id="pInfo-3"></p>
    <hr>

    <h2>Bài 4: Tính diện tích, chu vi hình chữ nhật</h2>
    <input type="number" placeholder="Nhập chiều dài" id="chieuDai">
    <input type="number" placeholder="Nhập chiều rộng" id="chieuRong">
    <button id="btnTinh-4">Tính</button>
    <p id="pInfo-4"></p>
    <hr>

    <h2>Bài 5: Tính tổng 2 ký số</h2>
    <input type="number" placeholder="Nhập số 2 chữ số" id="number">
    <button id="btnTongKySo">Tổng ký số</button>
    <p id="pInfo-5"></p>

    <!-- <script src="./example-4.js"></script> -->
    <!-- <script src="./example-5.js"></script> -->
</body>
</html>
